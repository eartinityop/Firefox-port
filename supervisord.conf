[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log

[program:xvfb]
command=Xvfb :1 -screen 0 %(ENV_RESOLUTION)s
autorestart=true
priority=10

[program:fluxbox]
command=fluxbox
environment=DISPLAY=":1"
autorestart=true
priority=20

[program:firefox]
command=firefox --no-sandbox
environment=DISPLAY=":1"
autorestart=true
priority=30

[program:x11vnc]
command=x11vnc -display :1 -rfbauth /root/.vnc/passwd -forever -shared -rfbport 5900
autorestart=true
priority=40

[program:novnc]
command=websockify --web /usr/share/novnc 6080 localhost:5900
autorestart=true
priority=50
